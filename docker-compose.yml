version: '3.8'

services:
  api:
    build: .
    container_name: secureflow_api
    ports:
      - "8000:8000"
    environment:
      - SECUREFLOW_MOCK=true
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    build: .
    container_name: secureflow_dashboard
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    volumes:
      - .:/app
    command: streamlit run dashboard/app.py --server.address 0.0.0.0